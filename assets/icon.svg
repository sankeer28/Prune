<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Drop shadow -->
  <ellipse cx="256" cy="468" rx="110" ry="18" fill="rgba(0,0,0,0.25)" />

  <!-- Main prune body -->
  <ellipse cx="256" cy="285" rx="158" ry="188" fill="url(#bodyGrad)" />

  <!-- Surface sheen -->
  <ellipse cx="210" cy="210" rx="58" ry="78" fill="white" opacity="0.09" transform="rotate(-15 210 210)" />

  <!-- Crease / longitudinal groove -->
  <path d="M 256 108 C 238 190 238 320 256 462" stroke="#2a0a2a" stroke-width="6" fill="none" opacity="0.45" />

  <!-- Stem -->
  <path d="M 256 100 C 258 72 268 52 282 36" stroke="#7a5520" stroke-width="11" fill="none" stroke-linecap="round" />

  <!-- Leaf -->
  <ellipse cx="295" cy="28" rx="26" ry="13" fill="url(#leafGrad)" transform="rotate(-38 295 28)" />
  <!-- Leaf vein -->
  <path d="M 282 36 C 288 32 294 28 302 22" stroke="#2a5510" stroke-width="1.5" fill="none" opacity="0.7" />

  <defs>
    <radialGradient id="bodyGrad" cx="40%" cy="38%" r="62%" fx="40%" fy="38%">
      <stop offset="0%"   stop-color="#7b3f7b" />
      <stop offset="45%"  stop-color="#4a1a4a" />
      <stop offset="100%" stop-color="#2a0a2a" />
    </radialGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5a9a2a" />
      <stop offset="100%" stop-color="#2a5a10" />
    </linearGradient>
  </defs>
</svg>
